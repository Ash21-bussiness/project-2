<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>JavaScript Objects and Its Properties</h2>
    <p>You can use .property or ["property"].</p>
    <p id="demo"></p>
    <script>
        // create an object
        var person = {
            firstname:"Aishah",
            age: 20,
        };
        document.getElementById("demo").innerHTML = person.firstname +    " am " + person.age + " years old";
    </script>
</body>
</html>
