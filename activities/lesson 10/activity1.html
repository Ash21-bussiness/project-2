<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h2>Convert a JAvaScript object itno a JSON string, and send it to the server.</h2> 
   <p id="result"></p>
   <script>
    var myObj ={ name: "Megha", age:17, grade: 11
    };
    var myJSON = JSON.stringify(myObj);

    var newObj= JSON.parse(myJSON);

    document.getElementById("result").innerHTML = newObj.name;
   </script>
</body>
</html>
