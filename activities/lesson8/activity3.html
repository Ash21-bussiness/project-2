<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Click the buttton to evaluate</p>
    <button onclick="myfunction()">Solve</button>
    <p id="result"></p>
    <script>
        function myfunction() {
            var x= 40;
            var y = 70;
            var a= eval("x+y") + "<br>";
            var b= eval("2 * 2") + "<br>";
            var c= eval("y-x") +"<br>";
            var res = a+b+c;// concatenates the string
        
        document.getElementById("result").innerHTML= res;}
    </script>
</body>
</html>
