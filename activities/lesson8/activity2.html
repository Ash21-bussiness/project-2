<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Multiply every element in the array with 10:-</p>
    <p id="product_value"></p>
    <script>
        var numbers = [35, 68, 280, 4190]
        function myfunction(num) {
            return num *10;
        }
        var newvalues = numbers.map(myfunction);
        document.getElementById("product_value").innerHTML = newvalues
    </script>
</body>
</html>
